# Main Configuration
main:
  containerCheckInterval: "5m"
  containerCheckOnChanges: true
  updateCheckInterval: ""
  prefix: ""

# MQTT Configuration
mqtt:
  connectionUri: "mqtt://127.0.0.1:1883"
  topic: "mqdockerup"
  discoveryPrefix: "homeassistant"
  suggestedArea: "Docker"
  clientId: "mqdockerup"
  username: "ha"
  password: ""
  haLegacy: false
  connectTimeout: 60
  protocolVersion: 5
  maxReconnectDelay: 300

# Access Tokens Configuration
accessTokens:
  dockerhub: ""
  github: ""

# Application API Configuration
# Configure API keys and settings for fetching release notes from application APIs
applicationApis:
  radarr:
    enabled: true
    apiKey: ""  # Get from Radarr Settings > General > Security > API Key
    # baseUrl: "http://radarr:7878"  # Optional: Override auto-detected URL
  sonarr:
    enabled: true
    apiKey: ""  # Get from Sonarr Settings > General > Security > API Key
  lidarr:
    enabled: true
    apiKey: ""  # Get from Lidarr Settings > General > Security > API Key
  readarr:
    enabled: true
    apiKey: ""  # Get from Readarr Settings > General > Security > API Key
    # baseUrl: "http://readarr:8787"  # Optional: Override auto-detected URL
  prowlarr:
    enabled: true
    apiKey: ""  # Get from Prowlarr Settings > General > Security > API Key
    # baseUrl: "http://prowlarr:9696"  # Optional: Override auto-detected URL
  bazarr:
    enabled: true
    apiKey: ""  # Get from Bazarr Settings > General > Security > API Key
    # baseUrl: "http://bazarr:6767"  # Optional: Override auto-detected URL


# Ignore Configuration
ignore:
  containers: ""
  updates: ""

# Logging Configuration
logs:
  level: "info"
